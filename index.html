<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="1;url=/dataguard/">
<title>StopThePwnage — Redirecting...</title>
<link rel="stylesheet" href="/shared/theme.css">
<style>
  .redirect-msg {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    font-family: 'Space Mono', monospace;
  }
  .redirect-msg p {
    color: var(--accent);
    font-size: 1rem;
    margin-bottom: 12px;
  }
  .redirect-msg a {
    color: var(--muted);
    font-size: 0.8rem;
  }
  .redirect-msg a:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="redirect-msg">
  <p>Redirecting to DataGuard...</p>
  <a href="/dataguard/">Click here if not redirected</a>
</div>
</body>
</html>

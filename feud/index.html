<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacked Feud — StopThePwnage</title>
<link rel="stylesheet" href="/shared/theme.css">
<style>
  /* Layout */
  .game-wrap {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
  }

  .back-link {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .back-link:hover { color: var(--accent); }

  .hidden { display: none !important; }

  /* ── Mode Select ── */
  .mode-select {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    text-align: center;
  }

  .mode-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.4rem, 7vw, 4rem);
    color: var(--accent);
    letter-spacing: 0.04em;
    text-shadow: 0 0 30px rgba(0,229,255,0.4), 0 0 60px rgba(0,229,255,0.15);
  }

  .mode-subtitle {
    font-family: 'Space Mono', monospace;
    font-size: clamp(0.8rem, 2vw, 1rem);
    color: var(--muted);
    margin-top: -32px;
  }

  .mode-cards {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .mode-card {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    width: 260px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
    text-decoration: none;
    color: inherit;
  }

  .mode-card:hover, .mode-card:focus-visible {
    border-color: var(--accent);
    box-shadow: var(--glow);
    transform: translateY(-6px);
    outline: none;
  }

  .mode-card-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 16px;
  }

  .mode-card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    color: var(--text);
    margin-bottom: 8px;
  }

  .mode-card-desc {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ── Game Screen (shared board layout) ── */
  .game-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 960px;
    width: 100%;
    margin: 0 auto;
  }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0 12px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .game-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.3);
  }

  .round-indicator {
    font-family: 'Space Mono', monospace;
    font-size: clamp(0.7rem, 1.5vw, 0.85rem);
    color: var(--muted);
  }

  /* Question */
  .question-bar {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
    text-align: center;
    margin-bottom: 20px;
  }

  .question-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(1.1rem, 2.8vw, 1.7rem);
    color: var(--text);
    line-height: 1.4;
  }

  /* Answer board */
  .answer-board {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
    flex: 1;
  }

  .answer-row {
    display: grid;
    grid-template-columns: 48px 1fr 72px;
    gap: 0;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid var(--border);
    min-height: 56px;
    transition: border-color 0.3s;
  }

  .answer-row.revealed {
    border-color: var(--accent);
  }

  .answer-rank {
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1rem, 2vw, 1.4rem);
    color: var(--muted);
  }

  .answer-row.revealed .answer-rank {
    color: var(--accent);
    background: rgba(0,229,255,0.1);
  }

  .answer-cell {
    background: var(--panel);
    display: flex;
    align-items: center;
    padding: 0 20px;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .answer-cell:hover:not(.flipped) {
    background: rgba(30,45,74,0.8);
  }

  .answer-hidden {
    font-family: 'Space Mono', monospace;
    font-size: clamp(0.9rem, 1.8vw, 1.1rem);
    color: var(--muted);
    letter-spacing: 0.1em;
    user-select: none;
  }

  .answer-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(1rem, 2vw, 1.3rem);
    color: var(--text);
    opacity: 0;
    transform: rotateX(90deg);
    transition: opacity 0.3s, transform 0.4s;
  }

  .answer-cell.flipped .answer-hidden { display: none; }
  .answer-cell.flipped .answer-text {
    opacity: 1;
    transform: rotateX(0deg);
  }

  .answer-points {
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: clamp(0.9rem, 1.8vw, 1.2rem);
    color: var(--panel);
    transition: color 0.3s;
  }

  .answer-row.revealed .answer-points {
    color: var(--accent);
    text-shadow: 0 0 12px rgba(0,229,255,0.3);
  }

  /* Strike display */
  .strikes {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 16px;
    min-height: 60px;
    align-items: center;
  }

  .strike-x {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.5rem, 5vw, 3.5rem);
    color: var(--danger);
    text-shadow: 0 0 20px rgba(255,59,92,0.5);
    opacity: 0;
    transform: scale(0);
    transition: opacity 0.3s, transform 0.3s;
  }

  .strike-x.active {
    opacity: 1;
    transform: scale(1);
  }

  .strike-x.flash {
    animation: strikeFlash 0.5s ease-out;
  }

  @keyframes strikeFlash {
    0% { transform: scale(2); opacity: 1; }
    50% { transform: scale(0.9); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes boardShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .shaking {
    animation: boardShake 0.4s ease-out;
  }

  /* Reveal flash on answer */
  @keyframes revealGlow {
    0% { box-shadow: inset 0 0 0 0 rgba(0,229,255,0); }
    30% { box-shadow: inset 0 0 30px rgba(0,229,255,0.3); }
    100% { box-shadow: inset 0 0 0 0 rgba(0,229,255,0); }
  }

  .answer-row.just-revealed {
    animation: revealGlow 0.6s ease-out;
  }

  /* Team scores (facilitator mode) */
  .team-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .team-block {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 200px;
  }

  .team-name-input {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: clamp(0.85rem, 1.5vw, 1.05rem);
    color: var(--text);
    background: none;
    border: none;
    border-bottom: 1px dashed var(--muted);
    padding: 2px 4px;
    width: 100px;
    text-align: center;
    cursor: text;
  }

  .team-name-input:focus {
    outline: none;
    border-bottom-color: var(--accent);
    color: var(--accent);
  }

  .team-pts {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    color: var(--warn);
    min-width: 50px;
    text-align: center;
  }

  /* Bottom controls (facilitator) */
  .controls-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }

  .ctrl-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .ctrl-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .ctrl-btn.danger:hover {
    border-color: var(--danger);
    color: var(--danger);
  }

  /* Award overlay */
  .award-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(10,14,26,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    text-align: center;
    padding: 40px 24px;
  }

  .award-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    color: var(--text);
  }

  .award-points {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.4);
  }

  .award-btns {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .award-btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    padding: 14px 32px;
    border-radius: 10px;
    border: 2px solid var(--accent);
    background: rgba(0,229,255,0.08);
    color: var(--accent);
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
  }

  .award-btn:hover {
    background: rgba(0,229,255,0.18);
    box-shadow: var(--glow);
    transform: scale(1.04);
  }

  .award-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 4px;
  }

  /* Solo input */
  .solo-input-bar {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 12px;
  }

  .solo-input {
    font-family: 'Space Mono', monospace;
    font-size: clamp(0.9rem, 1.8vw, 1rem);
    padding: 10px 16px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--panel);
    color: var(--text);
    width: 100%;
    max-width: 400px;
    transition: border-color 0.2s;
  }

  .solo-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .solo-input::placeholder {
    color: var(--muted);
  }

  .solo-submit {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 10px 24px;
    border-radius: 8px;
    border: 2px solid var(--accent);
    background: rgba(0,229,255,0.08);
    color: var(--accent);
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    white-space: nowrap;
  }

  .solo-submit:hover {
    background: rgba(0,229,255,0.18);
    box-shadow: var(--glow);
  }

  .solo-score-display {
    font-family: 'Space Mono', monospace;
    font-size: clamp(0.85rem, 1.5vw, 1rem);
    color: var(--warn);
    text-align: center;
    margin-bottom: 8px;
  }

  /* End screen */
  .end-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 24px;
    padding: 40px 24px;
  }

  .end-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,229,255,0.4);
  }

  .end-subtitle {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    color: var(--text);
  }

  .end-detail {
    font-family: 'Space Mono', monospace;
    font-size: clamp(0.8rem, 1.5vw, 0.95rem);
    color: var(--muted);
    line-height: 1.8;
  }

  .end-scores {
    list-style: none;
    margin: 12px 0;
  }

  .end-scores li {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(1.1rem, 2.5vw, 1.6rem);
    color: var(--text);
    padding: 8px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .end-scores li:first-child {
    color: var(--warn);
    font-size: clamp(1.4rem, 3vw, 2rem);
  }

  .end-scores .rank {
    font-family: 'Space Mono', monospace;
    font-size: 0.8em;
    color: var(--muted);
  }

  .end-scores .pts {
    font-family: 'Space Mono', monospace;
    color: var(--accent);
  }

  .play-again-btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(1rem, 2vw, 1.2rem);
    padding: 14px 40px;
    border-radius: 10px;
    border: 2px solid var(--accent);
    background: rgba(0,229,255,0.08);
    color: var(--accent);
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .play-again-btn:hover {
    background: rgba(0,229,255,0.18);
    box-shadow: var(--glow);
    transform: scale(1.04);
  }

  /* Three-strike lockout flash */
  @keyframes dangerFlash {
    0%, 100% { background: rgba(10,14,26,0); }
    50% { background: rgba(255,59,92,0.08); }
  }

  .danger-flash {
    animation: dangerFlash 0.3s ease-out 3;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .answer-row {
      grid-template-columns: 36px 1fr 56px;
      min-height: 48px;
    }
    .answer-cell { padding: 0 12px; }
    .team-block { min-width: 160px; padding: 8px 12px; }
    .team-name-input { width: 80px; }
    .mode-card { width: 220px; padding: 28px 24px; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="game-wrap" id="app">
  <!-- Mode Select -->
  <div id="modeSelect" class="mode-select">
    <h1 class="mode-title">HACKED FEUD</h1>
    <p class="mode-subtitle">Survey says... how security-savvy is your team?</p>
    <div class="mode-cards">
      <button class="mode-card" onclick="startGame('team')" aria-label="Start team battle mode">
        <span class="mode-card-icon">&#x1F465;</span>
        <div class="mode-card-name">Team Battle</div>
        <div class="mode-card-desc">Instructor-led group play. Project on screen, two teams compete.</div>
      </button>
      <button class="mode-card" onclick="startGame('solo')" aria-label="Start solo play mode">
        <span class="mode-card-icon">&#x1F3AE;</span>
        <div class="mode-card-name">Solo Play</div>
        <div class="mode-card-desc">Play alone. Type your guesses and see how many answers you can find.</div>
      </button>
    </div>
    <a href="/" class="back-link">&larr; Back to Hub</a>
  </div>

  <!-- Game Screen (team + solo share this) -->
  <div id="gameScreen" class="game-screen hidden"></div>

  <!-- End Screen -->
  <div id="endScreen" class="end-screen hidden"></div>
</div>

<script>
/* ============================================================
   ROUNDS — Edit this array to change all game content.
   5 rounds, each with 5–8 ranked answers. Points roughly sum to 100.
   ============================================================ */
const ROUNDS = [
  {
    question: "Name something people commonly use as a password",
    answers: [
      { text: "123456", points: 32 },
      { text: "password", points: 24 },
      { text: "Pet's name", points: 18 },
      { text: "Birthday", points: 12 },
      { text: "qwerty", points: 8 },
      { text: "Favorite sports team", points: 6 },
    ]
  },
  {
    question: "Name a sign that an email might be a phishing attempt",
    answers: [
      { text: "Suspicious sender address", points: 28 },
      { text: "Urgent or threatening language", points: 22 },
      { text: "Spelling and grammar errors", points: 18 },
      { text: "Unexpected attachment", points: 14 },
      { text: "Asks for personal info", points: 10 },
      { text: "Generic greeting", points: 5 },
      { text: "Mismatched URLs", points: 3 },
    ]
  },
  {
    question: "Name something you should do after a data breach",
    answers: [
      { text: "Change your passwords", points: 30 },
      { text: "Enable two-factor authentication", points: 22 },
      { text: "Monitor bank statements", points: 18 },
      { text: "Freeze your credit", points: 14 },
      { text: "Check Have I Been Pwned", points: 10 },
      { text: "Notify your employer", points: 6 },
    ]
  },
  {
    question: "Name a type of cyberattack",
    answers: [
      { text: "Phishing", points: 28 },
      { text: "Ransomware", points: 22 },
      { text: "DDoS attack", points: 16 },
      { text: "Man-in-the-middle", points: 12 },
      { text: "SQL injection", points: 10 },
      { text: "Brute force", points: 7 },
      { text: "Zero-day exploit", points: 5 },
    ]
  },
  {
    question: "Name something that makes a Wi-Fi network unsafe",
    answers: [
      { text: "No password required", points: 30 },
      { text: "Public or shared network", points: 22 },
      { text: "Default router password", points: 16 },
      { text: "No encryption (open network)", points: 14 },
      { text: "Fake hotspot / evil twin", points: 10 },
      { text: "Outdated firmware", points: 8 },
    ]
  },
];

/* ============================================================
   Game state
   ============================================================ */
let mode = null;              // 'team' or 'solo'
let currentRound = 0;
let strikes = 0;
let revealedAnswers = [];     // indices of revealed answers for current round
let roundOver = false;

// Team mode
let teams = [
  { name: "Team 1", score: 0 },
  { name: "Team 2", score: 0 },
];

// Solo mode
let soloScore = 0;
let soloRoundScores = [];
let soloRoundPoints = 0;
let soloGuessedAnswers = [];

/* ============================================================
   Answer matching (solo mode)
   ============================================================ */
function matchesAnswer(guess, answerText) {
  const g = guess.trim().toLowerCase();
  const a = answerText.trim().toLowerCase();
  if (!g) return false;
  return a.includes(g) || g.includes(a);
}

/* ============================================================
   Start game
   ============================================================ */
function startGame(selectedMode) {
  mode = selectedMode;
  currentRound = 0;
  strikes = 0;
  revealedAnswers = [];
  roundOver = false;
  soloScore = 0;
  soloRoundScores = [];
  teams[0].score = 0;
  teams[1].score = 0;

  document.getElementById('modeSelect').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  renderRound();
}

/* ============================================================
   Render round
   ============================================================ */
function renderRound() {
  const screen = document.getElementById('gameScreen');
  const round = ROUNDS[currentRound];
  strikes = 0;
  revealedAnswers = [];
  roundOver = false;

  let html = '';

  // Header
  html += '<div class="game-header">';
  html += '<a href="#" class="back-link" onclick="confirmBack(event)">&larr; Back</a>';
  html += '<span class="game-title">HACKED FEUD</span>';
  html += '<span class="round-indicator">Round ' + (currentRound + 1) + ' of ' + ROUNDS.length + '</span>';
  html += '</div>';

  // Question
  html += '<div class="question-bar"><div class="question-text">' + escHtml(round.question) + '</div></div>';

  // Strikes
  html += '<div class="strikes" id="strikes">';
  html += '<span class="strike-x" id="strike0">X</span>';
  html += '<span class="strike-x" id="strike1">X</span>';
  html += '<span class="strike-x" id="strike2">X</span>';
  html += '</div>';

  // Solo input
  if (mode === 'solo') {
    html += '<div class="solo-score-display">Score: <span id="soloScoreVal">' + soloScore + '</span></div>';
    html += '<div class="solo-input-bar">';
    html += '<input type="text" class="solo-input" id="guessInput" placeholder="Type your guess..." autocomplete="off">';
    html += '<button class="solo-submit" onclick="submitGuess()">Submit</button>';
    html += '</div>';
  }

  // Answer board
  html += '<div class="answer-board" id="answerBoard">';
  round.answers.forEach(function(ans, i) {
    html += '<div class="answer-row" id="row' + i + '"' +
      (mode === 'team' ? ' onclick="revealAnswer(' + i + ')"' : '') + '>';
    html += '<div class="answer-rank">' + (i + 1) + '</div>';
    html += '<div class="answer-cell" id="cell' + i + '">';
    html += '<span class="answer-hidden">&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;</span>';
    html += '<span class="answer-text">' + escHtml(ans.text) + '</span>';
    html += '</div>';
    html += '<div class="answer-points" id="pts' + i + '">' + ans.points + '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Team bar or solo controls
  if (mode === 'team') {
    html += '<div class="team-bar" id="teamBar">';
    teams.forEach(function(t, i) {
      html += '<div class="team-block">';
      html += '<input class="team-name-input" type="text" value="' + escAttr(t.name) + '" maxlength="16" ' +
        'onchange="teams[' + i + '].name=this.value||\'Team ' + (i+1) + '\'" aria-label="Team name">';
      html += '<span class="team-pts" id="teamPts' + i + '">' + t.score + '</span>';
      html += '</div>';
    });
    html += '</div>';

    // Controls
    html += '<div class="controls-bar">';
    html += '<button class="ctrl-btn danger" onclick="addStrike()">Strike ✕</button>';
    html += '<button class="ctrl-btn" onclick="revealAll()">Reveal All</button>';
    html += '</div>';
  } else {
    html += '<div class="controls-bar">';
    html += '<button class="ctrl-btn" onclick="giveUp()">Give Up</button>';
    html += '</div>';
  }

  screen.innerHTML = html;

  // Solo: focus input, bind enter key
  if (mode === 'solo') {
    var input = document.getElementById('guessInput');
    input.focus();
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submitGuess();
    });
  }
}

/* ============================================================
   Reveal an answer (shared)
   ============================================================ */
function revealAnswer(index) {
  if (revealedAnswers.includes(index)) return;
  revealedAnswers.push(index);

  var row = document.getElementById('row' + index);
  var cell = document.getElementById('cell' + index);
  row.classList.add('revealed', 'just-revealed');
  cell.classList.add('flipped');

  setTimeout(function() { row.classList.remove('just-revealed'); }, 600);

  // Check if all revealed
  if (revealedAnswers.length === ROUNDS[currentRound].answers.length) {
    onAllRevealed();
  }
}

/* ============================================================
   Facilitator: add strike
   ============================================================ */
function addStrike() {
  if (roundOver || strikes >= 3) return;
  var el = document.getElementById('strike' + strikes);
  el.classList.add('active', 'flash');
  strikes++;

  // Shake the board
  var board = document.getElementById('answerBoard');
  board.classList.add('shaking');
  setTimeout(function() { board.classList.remove('shaking'); }, 400);

  if (strikes >= 3) {
    // Flash danger
    var screen = document.getElementById('gameScreen');
    screen.classList.add('danger-flash');
    setTimeout(function() { screen.classList.remove('danger-flash'); }, 900);

    // Auto-reveal remaining after a beat
    setTimeout(function() { revealAll(); }, 600);
  }
}

/* ============================================================
   Reveal all remaining
   ============================================================ */
function revealAll() {
  var round = ROUNDS[currentRound];
  round.answers.forEach(function(_, i) {
    if (!revealedAnswers.includes(i)) {
      revealAnswer(i);
    }
  });
  onAllRevealed();
}

/* ============================================================
   All answers revealed
   ============================================================ */
function onAllRevealed() {
  if (roundOver) return;
  roundOver = true;

  if (mode === 'team') {
    showAwardPrompt();
  } else {
    soloRoundScores.push(soloRoundPoints);
    soloRoundPoints = 0;
    showSoloRoundEnd();
  }
}

/* ============================================================
   Solo: submit guess
   ============================================================ */
function submitGuess() {
  if (roundOver) return;
  var input = document.getElementById('guessInput');
  var guess = input.value.trim();
  if (!guess) return;
  input.value = '';

  var round = ROUNDS[currentRound];
  var matchedIndex = -1;

  for (var i = 0; i < round.answers.length; i++) {
    if (revealedAnswers.includes(i)) continue;
    if (matchesAnswer(guess, round.answers[i].text)) {
      matchedIndex = i;
      break;
    }
  }

  if (matchedIndex >= 0) {
    revealAnswer(matchedIndex);
    soloGuessedAnswers.push(matchedIndex);
    var pts = round.answers[matchedIndex].points;
    soloScore += pts;
    soloRoundPoints += pts;
    document.getElementById('soloScoreVal').textContent = soloScore;
  } else {
    // Strike
    addStrikeVisual();
  }

  if (!roundOver) input.focus();
}

function addStrikeVisual() {
  if (strikes >= 3) return;
  var el = document.getElementById('strike' + strikes);
  el.classList.add('active', 'flash');
  strikes++;

  var board = document.getElementById('answerBoard');
  board.classList.add('shaking');
  setTimeout(function() { board.classList.remove('shaking'); }, 400);

  if (strikes >= 3) {
    var screen = document.getElementById('gameScreen');
    screen.classList.add('danger-flash');
    setTimeout(function() { screen.classList.remove('danger-flash'); }, 900);
    setTimeout(function() {
      // Reveal remaining (these won't count for score)
      var round = ROUNDS[currentRound];
      round.answers.forEach(function(_, i) {
        if (!revealedAnswers.includes(i)) revealAnswer(i);
      });
      onAllRevealed();
    }, 600);
  }
}

/* ============================================================
   Solo: give up
   ============================================================ */
function giveUp() {
  if (roundOver) return;
  revealAll();
}

/* ============================================================
   Solo: round end UI
   ============================================================ */
function showSoloRoundEnd() {
  // Replace input with next round button
  var controls = document.querySelector('.controls-bar');
  var inputBar = document.querySelector('.solo-input-bar');
  if (inputBar) inputBar.classList.add('hidden');

  if (currentRound < ROUNDS.length - 1) {
    controls.innerHTML = '<button class="ctrl-btn" onclick="nextRound()" style="border-color:var(--accent);color:var(--accent);padding:12px 32px;font-size:0.9rem;">Next Round &rarr;</button>';
  } else {
    controls.innerHTML = '<button class="ctrl-btn" onclick="showEndScreen()" style="border-color:var(--accent);color:var(--accent);padding:12px 32px;font-size:0.9rem;">See Results &rarr;</button>';
  }
}

/* ============================================================
   Facilitator: award prompt
   ============================================================ */
function showAwardPrompt() {
  var round = ROUNDS[currentRound];
  var totalPts = 0;
  revealedAnswers.forEach(function(i) { totalPts += round.answers[i].points; });

  var overlay = document.createElement('div');
  overlay.className = 'award-overlay';
  overlay.id = 'awardOverlay';
  overlay.innerHTML =
    '<div class="award-title">Round ' + (currentRound + 1) + ' Complete!</div>' +
    '<div class="award-points">' + totalPts + ' points</div>' +
    '<div class="award-title">Who wins this round?</div>' +
    '<div class="award-btns">' +
    '<button class="award-btn" onclick="awardRound(0)">' + escHtml(teams[0].name) + '</button>' +
    '<button class="award-btn" onclick="awardRound(1)">' + escHtml(teams[1].name) + '</button>' +
    '</div>';

  document.getElementById('app').appendChild(overlay);
}

function awardRound(teamIndex) {
  var round = ROUNDS[currentRound];
  var totalPts = 0;
  revealedAnswers.forEach(function(i) { totalPts += round.answers[i].points; });

  teams[teamIndex].score += totalPts;

  // Remove overlay
  var overlay = document.getElementById('awardOverlay');
  if (overlay) overlay.remove();

  if (currentRound < ROUNDS.length - 1) {
    nextRound();
  } else {
    showEndScreen();
  }
}

/* ============================================================
   Next round
   ============================================================ */
function nextRound() {
  currentRound++;
  soloGuessedAnswers = [];
  soloRoundPoints = 0;
  renderRound();
}

/* ============================================================
   End screen
   ============================================================ */
function showEndScreen() {
  document.getElementById('gameScreen').classList.add('hidden');
  var end = document.getElementById('endScreen');
  end.classList.remove('hidden');

  var html = '<div class="end-title">GAME OVER</div>';

  if (mode === 'team') {
    var winner = teams[0].score >= teams[1].score ? teams[0] : teams[1];
    var tied = teams[0].score === teams[1].score;
    html += '<div class="end-subtitle">' + (tied ? "It's a tie!" : escHtml(winner.name) + ' wins!') + '</div>';

    var sorted = [...teams].sort(function(a, b) { return b.score - a.score; });
    html += '<ul class="end-scores">';
    sorted.forEach(function(t, i) {
      html += '<li><span class="rank">#' + (i + 1) + '</span> ' + escHtml(t.name) + ' <span class="pts">' + t.score + '</span></li>';
    });
    html += '</ul>';
  } else {
    var maxPossible = 0;
    ROUNDS.forEach(function(r) { r.answers.forEach(function(a) { maxPossible += a.points; }); });
    var pct = Math.round(soloScore / maxPossible * 100);

    html += '<div class="end-subtitle">Your Score: ' + soloScore + ' / ' + maxPossible + '</div>';
    html += '<div class="end-detail">' + pct + '% of all possible points</div>';

    html += '<div class="end-detail" style="margin-top:8px;">';
    soloRoundScores.forEach(function(pts, i) {
      html += 'Round ' + (i + 1) + ': ' + pts + ' pts<br>';
    });
    html += '</div>';
  }

  html += '<button class="play-again-btn" onclick="playAgain()">Play Again</button>';
  end.innerHTML = html;
}

/* ============================================================
   Play again / back
   ============================================================ */
function playAgain() {
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('modeSelect').classList.remove('hidden');
}

function confirmBack(e) {
  e.preventDefault();
  if (currentRound === 0 && revealedAnswers.length === 0 && strikes === 0) {
    playAgain();
  } else if (confirm('Leave the game? Progress will be lost.')) {
    playAgain();
  }
}

/* ============================================================
   Utility
   ============================================================ */
function escHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function escAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
</body>
</html>
